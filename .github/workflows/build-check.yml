name: Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cmake_args: ""
          - os: macos-latest
            cmake_args: ""
          - os: windows-latest
            cmake_args: "-A x64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libreadline-dev \
            libncurses-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install readline ncurses

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/install" \
            -DR_HOME="$(R RHOME)" \
            ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel
